<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Faust Desktop</title>
    <style>
      :root {
        --bg: #0c0f16;
        --bg-soft: #121826;
        --card: #171e2e;
        --line: #2a344d;
        --text: #e6ecff;
        --muted: #96a2bf;
        --accent: #7aa2ff;
        --accent-2: #94f6d2;
        --danger: #ff9fa6;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background:
          radial-gradient(1200px 600px at 8% -10%, #24335766, transparent),
          radial-gradient(1000px 480px at 110% 20%, #2c574766, transparent),
          var(--bg);
        color: var(--text);
      }

      .shell {
        height: 100vh;
        display: grid;
        grid-template-rows: 58px 1fr;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 18px;
        border-bottom: 1px solid #25304a;
        background: #0f1420cc;
        backdrop-filter: blur(4px);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 600;
      }

      .brand-dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: var(--accent);
        box-shadow: 0 0 18px #7aa2ff99;
      }

      .workspace {
        padding: 14px;
        display: grid;
        gap: 14px;
        grid-template-columns: 1.2fr 1fr;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 14px;
        background: linear-gradient(180deg, #1a2234, #141b2b);
        padding: 12px;
      }

      .panel-title {
        color: var(--muted);
        font-size: 13px;
        margin-bottom: 10px;
      }

      .left-col {
        display: grid;
        grid-template-rows: 1fr auto;
        gap: 14px;
        min-height: 0;
      }

      .avatar-stage {
        position: relative;
        overflow: hidden;
        min-height: 320px;
      }

      .avatar-canvas {
        height: 100%;
        border: 1px dashed #3a4768;
        border-radius: 12px;
        background:
          radial-gradient(500px 220px at 50% 10%, #5878b433, transparent),
          linear-gradient(180deg, #11182a, #0d1321);
        display: grid;
        place-items: center;
        color: #8fa2d0;
        text-align: center;
        padding: 20px;
      }

      .avatar-tip {
        position: absolute;
        bottom: 12px;
        left: 12px;
        right: 12px;
        padding: 8px 10px;
        border: 1px solid #3a496c;
        border-radius: 10px;
        background: #0d1424cc;
        color: #9db1df;
        font-size: 12px;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .controls + .controls {
        margin-top: 8px;
      }

      button {
        background: #26314a;
        color: #f0f5ff;
        border: 1px solid #3a496c;
        border-radius: 10px;
        padding: 8px 12px;
        cursor: pointer;
      }

      button:hover {
        background: #314061;
      }
      button.active {
        border-color: #57a87f;
        box-shadow: 0 0 0 1px #57a87f inset;
      }

      .status-badge {
        margin-left: auto;
        font-size: 12px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid #3d4a6d;
        color: var(--muted);
        background: #10182a;
      }

      .status-running {
        color: #c8ffe5;
        border-color: #3ea576;
      }

      .right-col {
        display: grid;
        grid-template-rows: 1fr auto auto;
        gap: 12px;
        min-height: 0;
      }

      .chat-log {
        min-height: 0;
        overflow: auto;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .chat-item {
        max-width: 92%;
        padding: 9px 11px;
        border-radius: 10px;
        line-height: 1.45;
        white-space: pre-wrap;
      }

      .msg-user {
        align-self: flex-end;
        background: #23324f;
        border: 1px solid #3d537d;
        color: #d2e4ff;
      }

      .msg-bot {
        align-self: flex-start;
        background: #1f2d3f;
        border: 1px solid #42577a;
        color: #d6ffe8;
      }

      .msg-err {
        align-self: flex-start;
        background: #3f1f2b;
        border: 1px solid #89445f;
        color: #ffd8df;
      }

      .chat-input {
        width: 100%;
        min-height: 82px;
        resize: vertical;
        border-radius: 10px;
        border: 1px solid #344566;
        background: #0f1728;
        color: var(--text);
        padding: 10px;
      }

      .chat-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .chat-status {
        font-size: 12px;
        color: var(--muted);
      }
      .voice-status {
        font-size: 12px;
        color: #9eb2da;
      }

      .log {
        margin-top: 8px;
        height: 120px;
        overflow: auto;
        white-space: pre-wrap;
        font-size: 12px;
        color: #cad5ef;
        border-radius: 8px;
        border: 1px solid #33435f;
        background: #0e1627;
        padding: 8px;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="topbar">
        <div class="brand">
          <span class="brand-dot"></span>
          <span>Faust Control Deck</span>
        </div>
        <div style="display: flex; gap: 8px; align-items: center">
          <span class="status-badge" id="emotionBadge">emotion: analytical</span>
          <span class="status-badge" id="agentStatus">idle</span>
        </div>
      </div>

      <div class="workspace">
        <div class="left-col">
          <div class="panel avatar-stage">
            <div class="panel-title">Live2D Stage (예정)</div>
            <div class="avatar-canvas" id="avatarStage">
              <div>
                <div style="font-size: 16px; margin-bottom: 8px">아바타 렌더 캔버스 영역</div>
                <div style="font-size: 13px">Live2D Cubism / Lip-sync / Idle Motion 연결 예정</div>
              </div>
            </div>
            <div class="avatar-tip">
              팁: 추후 아바타 엔진은 `#avatarStage`를 캔버스 컨테이너로 사용하면 됩니다.
            </div>
          </div>

          <div class="panel">
            <div class="panel-title">Agent Control</div>
            <div class="controls">
              <button id="startAgentBtn">에이전트 시작</button>
              <button id="stopAgentBtn">에이전트 중지</button>
            </div>
            <div class="controls">
              <button id="toggleMicBtn">음성 입력 시작</button>
              <button id="toggleSpeechBtn" class="active">음성 출력 ON</button>
              <span class="voice-status" id="voiceStatus">마이크 대기</span>
            </div>
            <div class="log" id="agentLog"></div>
          </div>
        </div>

        <div class="right-col">
          <div class="panel" style="min-height: 0">
            <div class="panel-title">Chat</div>
            <div class="chat-log" id="chatLog"></div>
          </div>

          <div class="panel">
            <textarea id="chatInput" class="chat-input" placeholder="파우스트에게 보낼 메시지를 입력하세요..."></textarea>
            <div class="chat-row" style="margin-top: 8px">
              <button id="sendBtn">전송</button>
              <span class="chat-status" id="chatStatus"></span>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="./renderer.js"></script>
  </body>
  </html>
